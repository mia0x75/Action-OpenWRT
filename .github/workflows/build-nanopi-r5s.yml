name: Standalone Build for NanoPi-R5S

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        default: 'v24.10.0' # Default Tag to Build
      debug:
        description: 'Enable Debug'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: write
  actions: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: nanopi-r5s-full.config
  PRE_FEEDS_UPDATE: 00-feeds-update.sh
  SOURCE_PATCH: 01-source-patch.sh
  POST_FEEDS_UPDATE: 99-feeds-update.sh
  TZ: Asia/Shanghai

jobs:
  build:
    name: "жһ„е»әеӣәд»¶"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    runs-on: ubuntu-22.04

    steps:
    - name: зӯҫеҮәеҪ“еүҚд»Јз Ғеә“жңҖж–°д»Јз Ғ
      uses: actions/checkout@v4

    - name: иҺ·еҸ–еҫ…жһ„е»әзҡ„еӣәд»¶зүҲжң¬ж Үзӯҫ
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          tag="${{ github.event.inputs.tag }}"
        else
          tag="${{ github.event.client_payload.tag }}"
        fi
        echo "tag=${tag}" >> $GITHUB_OUTPUT

    - name: е…ӢйҡҶзү№е®ҡж Үзӯҫзҡ„еӣәд»¶д»Јз Ғеә“д»Јз ҒеҲ°жң¬ең°
      run: |
        echo "жңҚеҠЎеҷЁй…ҚзҪ®дҝЎжҒҜпјҡ"
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ еӨ„зҗҶеҷЁпјҡ"
        echo "_/ еӨ„зҗҶеҷЁж•°йҮҸпјҡ(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "_/ ж ёеҝғж•°йҮҸпјҡ$(nproc)"
        echo -e "_/ еӨ„зҗҶеҷЁеһӢеҸ·пјҡ$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"
        echo "_/"
        echo "_/ еҶ…еӯҳдҝЎжҒҜпјҡ"
        sudo lshw -short -C memory | grep GiB | awk '{print "_/ " $0}'
        echo "_/"
        echo "_/ зЎ¬зӣҳдҝЎжҒҜпјҡ"
        echo "_/ зЎ¬зӣҳж•°йҮҸ: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT | awk '{print "_/ " $0}'
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"

        sudo mkdir -p /mnt/workdir
        sudo chown $USER:$GROUPS /mnt/workdir
        cd /mnt/workdir

        git clone $REPO_URL openwrt
        ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        git fetch --all
        git checkout tags/${{ steps.version.outputs.tag }}

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo "Upstream latest tag: ${{ steps.version.outputs.tag }}"
          echo "Current released tag: $(awk '/latest/{print $NF; exit}' README.md)"
        fi

        COMMIT_AUTHOR=$(git show -s --date=short --format="дҪңиҖ…: %an")
        echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
        COMMIT_DATE=$(git show -s --date=short --format="ж—¶й—ҙ: %ci")
        echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
        COMMIT_MESSAGE=$(git show -s --date=short --format="еҶ…е®№: %s")
        echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
        COMMIT_HASH=$(git show -s --date=short --format="hash: %H")
        echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

    - name: еҲқе§ӢеҢ–зј–иҜ‘зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo apt-get -qq update --fix-missing
        sudo apt full-upgrade -y

        # https://openwrt.org/docs/guide-developer/toolchain/install-buildsystem#examples_of_package_installations
        # for ubuntu-22.04
        sudo apt-get -y -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev upx-ucl \
          python3-distutils rsync unzip zlib1g-dev file wget qemu-utils > /dev/null
        sudo pip3 install pyelftools
        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo pip3 install pyelftools 
        sudo systemctl daemon-reload
        echo
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ зЈҒзӣҳз©әй—ҙ"
        echo "_/"
        df -h | awk '{print "_/ " $0}'
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"

    - name: еҠ иҪҪиҮӘе®ҡд№үиҪҜд»¶жәҗ
      run: |
        cd openwrt
        sh $GITHUB_WORKSPACE/scripts/$PRE_FEEDS_UPDATE

    - name: жӣҙж–°иҪҜд»¶жәҗ
      run: |
        cd openwrt
        ./scripts/feeds update -a

    - name: е®үиЈ…иҪҜд»¶жәҗ
      run: |
        cd openwrt
        ./scripts/feeds install -a
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          cat feeds/packages/net/open-app-filter/Makefile
        fi

        sh $GITHUB_WORKSPACE/scripts/$SOURCE_PATCH

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          cat feeds/packages/net/open-app-filter/Makefile
        fi

    - name: еҠ иҪҪзј–иҜ‘й…ҚзҪ®ж–Үд»¶
      run: |
        [ -e files ] && cp -R files openwrt/files
        if [ -e devices/$CONFIG_FILE ]; then 
          cp devices/$CONFIG_FILE openwrt/.config
          VERSION_NUMBER=$(echo "${{ steps.version.outputs.tag }}" | sed -E 's/v([0-9]+\.[0-9]+)\.[0-9]+/\1/')
          sed -i "s/__VERSION_NUMBER__/$VERSION_NUMBER/g" openwrt/.config
        else
          exit 1
        fi

    - name: еӨ„зҗҶзј–иҜ‘й…ҚзҪ®ж–Үд»¶
      id: package
      run: |
        cd openwrt
        make defconfig
        make clean

        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/  * /g' Plug-in
        sed -i 's/=y/\ /g' Plug-in
        sed -i 's/=m/\ /g' Plug-in

        echo
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ е·ІйҖүжҸ’д»¶еҲ—иЎЁ..."
        echo "_/"
        cat Plug-in > $GITHUB_WORKSPACE/packages.txt
        sed -i 's/^  \*/_\//g' Plug-in
        cat Plug-in
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo -e "\n\n"

        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV

    - name: дёӢиҪҪеҫ…зј–иҜ‘иҪҜд»¶еҢ…
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        [ -e $GITHUB_WORKSPACE/settings/banner ] && cp $GITHUB_WORKSPACE/settings/banner package/base-files/files/etc

    - name: еҶҚж¬ЎжЈҖжҹҘжҜ”иҫғзј–иҜ‘й…ҚзҪ®ж–Үд»¶
      run: |
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          echo "_/ зј–иҜ‘зЁӢеәҸдҝ®жӯЈеҗҺзҡ„й…ҚзҪ®ж–Үд»¶ ..."
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          echo
          cat openwrt/.config || true
        fi
        echo
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ зј–иҜ‘зЁӢеәҸдҝ®жӯЈеҗҺзҡ„еҸҳеҢ– ..."
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo
        diff $GITHUB_WORKSPACE/devices/$CONFIG_FILE openwrt/.config || true

        cd openwrt
        # дҝ®ж”№дё»жңәеҗҚз§°
        sed -i 's/ImmortalWrt/NanoPi-R5S/g' package/base-files/files/bin/config_generate
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ з”ҹжҲҗзҡ„й…ҚзҪ®ж–Үд»¶"
        echo "_/"
        cat package/base-files/files/bin/config_generate | awk '{print "_/ " $0}'
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"

        sh $GITHUB_WORKSPACE/scripts/$POST_FEEDS_UPDATE

    - name: зј–иҜ‘еӣәд»¶
      id: compile-firmware
      run: |
        set -e
        cd openwrt

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          make -j$(nproc) toolchain/install
          make -j1 V=sc
        else
          make -j$(nproc) || make -j1 V=sc
        fi
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: з»„з»Үж–Үд»¶
      id: organize
      if: steps.compile-firmware.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          tree .
        fi

        rm -rf packages
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          tree .
        fi

        #
        VERSION_NUMBER=$(echo "${{ steps.version.outputs.tag }}" | sed -E 's/v([0-9]+\.[0-9]+)\.[0-9]+/\1/')
        for file in openwrt-${VERSION_NUMBER}-immortalwrt-*; do
          mv "$file" "${file#openwrt-${VERSION_NUMBER}-immortalwrt-}"
        done

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          echo "_/ еҫ…еҸ‘еёғж–Үд»¶еҲ—иЎЁ..."
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          tree .
          echo
        fi
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

        echo "еҸ‘еёғзүҲжң¬пјҡ${{ steps.version.outputs.tag }}" > $GITHUB_WORKSPACE/release.txt
        echo "е№іеҸ°жһ¶жһ„пјҡ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}" >> $GITHUB_WORKSPACE/release.txt
        echo "еӣәд»¶жәҗз Ғпјҡ${{ env.REPO_URL }}" >> $GITHUB_WORKSPACE/release.txt
        echo "еҶ…ж ёзүҲжң¬пјҡ$(cat *.manifest | grep ^kernel | cut -d- -f2 | tr -d ' ')" >> $GITHUB_WORKSPACE/release.txt
        echo "й»ҳи®Өең°еқҖпјҡ192.168.1.1" >> $GITHUB_WORKSPACE/release.txt
        echo "й»ҳи®ӨеҜҶз Ғпјҡз©ә" >> $GITHUB_WORKSPACE/release.txt
        echo "жһ„е»әж—Ҙжңҹпјҡ${{ env.DATE }}" >> $GITHUB_WORKSPACE/release.txt
        echo "жҸ’д»¶еҲ—иЎЁпјҡ" >> $GITHUB_WORKSPACE/release.txt
        echo "" >> $GITHUB_WORKSPACE/release.txt
        cat $GITHUB_WORKSPACE/packages.txt >> $GITHUB_WORKSPACE/release.txt

        rm -rf $GITHUB_WORKSPACE/Plug-in
        RELEASE_BODY=$(cat $GITHUB_WORKSPACE/release.txt)
        echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
        echo "$RELEASE_BODY" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

        echo "status=success" >> $GITHUB_OUTPUT

    - name: жҹҘзңӢзј–иҜ‘иҫ“еҮә
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: ls -lah ${{ env.FIRMWARE }}

    - name: дёҠдј еҲ°дёҙж—¶дҪҚзҪ®
      if: steps.organize.outputs.status == 'success' && !cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: ${{ env.FIRMWARE }}/

    - name: еҶҚж¬ЎжЈҖжҹҘзј–иҜ‘иҫ“еҮә
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: ls -lah ${{ env.FIRMWARE }}

    - name: дёҠдј еҲ°еҸ‘еёғйЎөйқў
      id: release
      if: steps.organize.outputs.status == 'success' && !cancelled()
      uses: svenstaro/upload-release-action@v2
      env:
        TAG: ${{ steps.version.outputs.tag }}
      with:
        file: ${{ env.FIRMWARE }}/*
        file_glob: true
        tag: Standalone-NanoPi-R5S-${{ env.TAG }}
        overwrite: true
        body: ${{ env.RELEASE_BODY }}

    - name: з§»йҷӨе·ІиҝҮж—¶зҡ„ж—§зүҲжң¬
      if: steps.release.outputs.browser_download_url != '' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 3
        delete_tag_pattern: NanoPi-R5S
        delete_tags: true

  update-repo:
    needs:
      - build
    runs-on: ubuntu-latest
    name: "жӣҙж–°еҪ“еүҚд»Јз Ғеә“"
    env:
      TAG: ${{ needs.build.outputs.tag }}

    steps:
      - name: зӯҫеҮәеҪ“еүҚд»Јз Ғеә“
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: жӣҙж–°еҜ№еә”д»Јз Ғ
        id: update-code
        run: |
          sed -i "s/\(latest.*:\).*/\1 ${{ env.TAG }}/" README.md
          sed -i "/# Default Tag to Build/s/\(default[[:space:]]*:\).*/\1 '${{ env.TAG }}' # Default Tag to Build/" .github/workflows/build-nanopi-r5s.yml

          git checkout --orphan tmp_work
          git branch -D main
          DATE="$(date '+%Y/%m/%d')"
          COMMENT="Build to ${{ env.TAG }} by Github Actions, ${DATE}"

          git branch -m main
          echo "msg=$COMMENT" >> $GITHUB_OUTPUT

      - name: жҸҗдәӨе№¶жҺЁйҖҒд»Јз Ғ
        env:
          MSG: ${{ steps.update-code.outputs.msg }}
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: ${{ env.MSG }}
          force: true

      - name: з§»йҷӨеҪ“еүҚи„ҡжң¬иҝҗиЎҢеҺҶеҸІ
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "NanoPi-R5S"
          retain_days: 0
          keep_minimum_runs: 10
          delete_run_by_conclusion_pattern: "cancelled, skipped, success"
