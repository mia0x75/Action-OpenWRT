name: Standalone Build for Intel-x86-64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: true
        default: 'v24.10.0'
      debug:
        description: 'Enable Debug'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: write
  actions: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: intel-x86-64-full.config
  PRE_FEEDS_UPDATE: 00-feeds-update.sh
  POST_FEEDS_UPDATE: 99-feeds-update.sh
  TZ: Asia/Shanghai

jobs:
  build:
    name: "构建固件"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    runs-on: ubuntu-22.04

    steps:
    - name: 签出当前代码库最新代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}

    - name: 获取待构建的固件版本标签
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          tag="${{ github.event.inputs.tag }}"
        else
          tag="${{ github.event.client_payload.tag }}"
        fi
        echo "tag=${tag}" >> $GITHUB_OUTPUT

    - name: 克隆特定标签的固件代码库代码到本地
      run: |
        echo "服务器配置信息："
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ 处理器："
        echo "_/ 处理器数量：(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "_/ 核心数量：$(nproc)"
        echo -e "_/ 处理器型号：$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"
        echo "_/"
        echo "_/ 内存信息："
        sudo lshw -short -C memory | grep GiB | awk '{print "_/ " $0}'
        echo "_/"
        echo "_/ 硬盘信息："
        echo "_/ 硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT | awk '{print "_/ " $0}'
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"

        sudo mkdir -p /mnt/workdir
        sudo chown $USER:$GROUPS /mnt/workdir
        cd /mnt/workdir

        git clone $REPO_URL openwrt
        ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        git fetch --all
        git checkout tags/${{ steps.version.outputs.tag }}

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo "Upstream latest tag: ${{ steps.version.outputs.tag }}"
          echo "Current released tag: $(awk '/latest/{print $NF; exit}' README.md)"
        fi

        COMMIT_AUTHOR=$(git show -s --date=short --format="作者: %an")
        echo "COMMIT_AUTHOR=$COMMIT_AUTHOR" >> $GITHUB_ENV
        COMMIT_DATE=$(git show -s --date=short --format="时间: %ci")
        echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
        COMMIT_MESSAGE=$(git show -s --date=short --format="内容: %s")
        echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
        COMMIT_HASH=$(git show -s --date=short --format="hash: %H")
        echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi `docker images -q`
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /etc/mysql /etc/php
        sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install libfuse-dev $(curl -fsSL git.io/depends-ubuntu-2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo apt-get -qq update --fix-missing
        sudo apt full-upgrade -y

        # https://openwrt.org/docs/guide-developer/toolchain/install-buildsystem#examples_of_package_installations
        # for ubuntu-22.04
        sudo apt-get -y -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget qemu-utils > /dev/null
        sudo pip3 install pyelftools
        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo systemctl daemon-reload
        echo
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ 磁盘空间"
        echo "_/"
        df -h | awk '{print "_/ " $0}'
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"

    - name: 加载自定义软件源
      run: |
        cd openwrt
        sh $GITHUB_WORKSPACE/scripts/$PRE_FEEDS_UPDATE

    - name: 更新软件源
      run: |
        cd openwrt
        ./scripts/feeds update -a

    - name: 安装软件源
      run: |
        cd openwrt
        ./scripts/feeds install -a
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          cat feeds/packages/net/open-app-filter/Makefile
        fi
        patch feeds/packages/net/open-app-filter/Makefile $GITHUB_WORKSPACE/patches/open-app-filter-makefile.patch
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          cat feeds/packages/net/open-app-filter/Makefile
        fi

    - name: 加载编译配置文件
      run: |
        [ -e files ] && cp -R files openwrt/files
        [ -e devices/$CONFIG_FILE ] && cp devices/$CONFIG_FILE openwrt/.config
        VERSION_NUMBER=$(echo "${{ steps.version.outputs.tag }}" | sed -E 's/v([0-9]+\.[0-9]+)\.[0-9]+/\1/')
        sed -i "s/__VERSION_NUMBER__/$VERSION_NUMBER/g" openwrt/.config

    - name: 处理编译配置文件
      id: package
      run: |
        cd openwrt
        make defconfig
        make clean

        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        # grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/  * /g' Plug-in
        sed -i 's/=y/\ /g' Plug-in
        sed -i 's/=m/\ /g' Plug-in

        echo
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ 已选插件列表..."
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo
        cat Plug-in
        echo -e "\n\n"

        mv Plug-in $GITHUB_WORKSPACE/packages.txt
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV

    - name: 下载待编译软件包
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        [ -e $GITHUB_WORKSPACE/etc/banner ] && cp $GITHUB_WORKSPACE/etc/banner package/base-files/files/etc

    - name: 再次检查比较编译配置文件
      run: |
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          echo "_/ 编译程序修正后的配置文件 ..."
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          echo
          cat openwrt/.config || true
        fi
        echo
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "_/ 编译程序修正后的变化 ..."
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo
        diff $GITHUB_WORKSPACE/devices/$CONFIG_FILE openwrt/.config || true

        cd openwrt
        sh $GITHUB_WORKSPACE/scripts/$POST_FEEDS_UPDATE

    - name: 编译固件
      id: compile-firmware
      run: |
        set -e
        cd openwrt

        # make -j$(nproc) toolchain/install
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          make -j1 V=sc
        else
          make -j$(nproc)
        fi
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 组织文件
      id: organize
      if: steps.compile-firmware.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          tree .
        fi

        cp *rootfs*.tar.gz /mnt/workdir/openwrt

        rm -rf packages
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          tree .
        fi

        # ├── config.buildinfo
        # ├── feeds.buildinfo
        # ├── openwrt-24.10-immortalwrt-x86-64-xxxxxx
        # ├── profiles.json
        # ├── sha256sums
        # └── version.buildinfo

        #
        VERSION_NUMBER=$(echo "${{ steps.version.outputs.tag }}" | sed -E 's/v([0-9]+\.[0-9]+)\.[0-9]+/\1/')
        for file in openwrt-${VERSION_NUMBER}-immortalwrt-*; do
          mv "$file" "${file#openwrt-${VERSION_NUMBER}-immortalwrt-}"
        done

        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          echo "_/ 待发布文件列表..."
          echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
          tree .
          echo
        fi
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        cat *.manifest | grep ^kernel | cut -d- -f2 | tr -d ' ')
        echo "_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/_/"
        echo "KERNEL=$(cat *.manifest | grep ^kernel | cut -d- -f2 | tr -d ' ')" >> $GITHUB_ENV

        echo "发布版本：${{ steps.version.outputs.tag }}" > $GITHUB_WORKSPACE/release.txt
        echo "平台架构：${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}" >> $GITHUB_WORKSPACE/release.txt
        echo "固件源码：${{ env.REPO_URL }}" >> $GITHUB_WORKSPACE/release.txt
        echo "内核版本：${{ env.KERNEL }}" >> $GITHUB_WORKSPACE/release.txt
        echo "默认地址：192.168.1.1" >> $GITHUB_WORKSPACE/release.txt
        echo "默认密码：空" >> $GITHUB_WORKSPACE/release.txt
        echo "构建日期：${{ env.DATE }}" >> $GITHUB_WORKSPACE/release.txt
        echo "插件列表：" >> $GITHUB_WORKSPACE/release.txt
        echo "" >> $GITHUB_WORKSPACE/release.txt
        cat $GITHUB_WORKSPACE/packages.txt >> $GITHUB_WORKSPACE/release.txt

        rm -rf $GITHUB_WORKSPACE/Plug-in
        RELEASE_BODY=$(cat $GITHUB_WORKSPACE/release.txt)
        echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
        echo "$RELEASE_BODY" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

        echo "status=success" >> $GITHUB_OUTPUT

    - name: 查看编译输出
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: ls -lah ${{ env.FIRMWARE }}

    - name: 上传到临时位置
      if: steps.organize.outputs.status == 'success' && !cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: ${{ env.FIRMWARE }}/

    - name: 再次检查编译输出
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: ls -lah ${{ env.FIRMWARE }}

    - name: 上传到发布页面
      id: release
      if: steps.organize.outputs.status == 'success' && !cancelled()
      uses: svenstaro/upload-release-action@v2
      env:
        TAG: ${{ steps.version.outputs.tag }}
      with:
        file: ${{ env.FIRMWARE }}/*
        file_glob: true
        tag: Standalone-Intel-x86_64-${{ env.TAG }}
        overwrite: true
        body: ${{ env.RELEASE_BODY }}

    - name: 设置容器构建环境
      uses: docker/setup-buildx-action@v2

    - name: 查找镜像所需的文件
      id: find-rootfs
      run: |
        ROOTFS_PATH=$(find openwrt/bin/targets -name "*rootfs*.tar.gz" | head -n 1)
        if [ -z "$ROOTFS_PATH" ]; then
          exit 1
        fi
        echo "::set-output name=rootfs_path::$ROOTFS_PATH"

    - name: 复制镜像所需的文件
      run: |
        mkdir -p docker-build-context
        cp ${{ steps.find-rootfs.outputs.rootfs_path }} docker-build-context/rootfs.tar.gz

    - name: 登录到镜像网站
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 开始构建镜像
      run: |
        # 复制 rootfs.tar.gz 到 Dockerfile 所在目录
        cp openwrt/bin/targets/*/*/*rootfs*.tar.gz $GITHUB_WORKSPACE/
        cd $GITHUB_WORKSPACE

         # 构建镜像
        docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/openwrt:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/openwrt:${{ steps.version.outputs.tag }} \
          --push .

    - name: 移除已过时的旧版本
      if: steps.release.outputs.browser_download_url != '' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 3
        delete_tag_pattern: intel-x86_64
        delete_tags: true

  update-repo:
    needs:
      - build
    runs-on: ubuntu-latest
    name: "更新当前代码库"
    env:
      TAG: ${{ needs.build.outputs.tag }}

    steps:
      - name: 签出当前代码库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: 更新对应代码
        id: update-code
        run: |
          sed -i "s/\(latest.*:\).*/\1 ${{ env.TAG }}/" README.md
          sed -i "s/\(default[[:space:]]*:\).*/\1 '${{ env.TAG }}'/" .github/workflows/build-intel-x86-64.yml

          git checkout --orphan tmp_work
          git branch -D main
          DATE="$(date '+%Y/%m/%d')"
          COMMENT="Build to ${{ env.TAG }} by Github Actions, ${DATE}"

          git branch -m main
          echo "msg=$COMMENT" >> $GITHUB_OUTPUT

      - name: 提交并推送代码
        env:
          MSG: ${{ steps.update-code.outputs.msg }}
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: ${{ env.MSG }}
          force: true

      - name: 移除当前脚本运行历史
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "Intel-x86-64"
          retain_days: 0
          keep_minimum_runs: 10
          delete_run_by_conclusion_pattern: "cancelled, skipped, success"
